<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			figure.zoom {
				background-position: 50% 50%;
				position: relative;
				width: 800px;
				overflow: hidden;
				cursor: zoom-in;
			}
			img:hover {
				opacity: 0;
			}
			img {
				transition: opacity 0.5s;
				display: block;
				width: 100%;
				overflow: hidden;
			}
			#sizeSlider {
				width: 700px;
				margin-bottom: 20px;
			}
		</style>
		<title>Document</title>
	</head>
	<body>
		<figure
		class="zoom" 
		id="zoom"
		onmousemove="zoom(event)"
		>
		<img src="./img/dinck.png" />
	</figure>
	<input
		type="range"
		min="1200"
		max="5000"
		value="1800"
		id="sizeSlider"
		>
		<script>
			let slidersize = document.getElementById("sizeSlider");
			slidersize.oninput = function() {
				size = this.value;
				document.getElementById("zoom").style="background-image: url(./img/dinckelsbuel_png.jpg); background-size: "+size+"px;"
			}
			let size = slidersize.value;
			document.getElementById("zoom").style="background-image: url(./img/dinckelsbuel_png.jpg); background-size: "+size+"px;"
			function zoom(e) {
				var zoomer = e.currentTarget;
				e.offsetX ? (offsetX = e.offsetX) : (offsetX = e.touches[0].pageX);
				e.offsetY ? (offsetY = e.offsetY) : (offsetX = e.touches[0].pageX);
				x = (offsetX / zoomer.offsetWidth) * 100;
				y = (offsetY / zoomer.offsetHeight) * 100;
				zoomer.style.backgroundPosition = x + "%" + y + "%";
			}
		</script>
	</body>
</html>
